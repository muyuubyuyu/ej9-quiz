<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honda EJ9 Hardcore Quiz</title>
<style>
:root{
  --bg:#0d0f14;
  --panel:#171b24;
  --panel2:#1f2531;
  --text:#f5f7fb;
  --muted:#aab3c5;
  --accent:#d91f26;
  --accent2:#ff5a5f;
  --good:#1f8f4e;
  --bad:#a63434;
  --border:rgba(255,255,255,.08);
}
*{box-sizing:border-box}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(180deg,#0a0c11,#11151d);
  color:var(--text);
  margin:0;
  padding:24px;
}
.wrap{max-width:1100px;margin:0 auto}
.hero{
  background:linear-gradient(135deg,rgba(217,31,38,.18),rgba(255,255,255,.03));
  border:1px solid var(--border);
  border-radius:22px;
  padding:24px;
  margin-bottom:20px;
}
.hero h1{margin:0 0 8px;font-size:38px}
.hero p{margin:0;color:var(--muted)}
.topbar,.meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.pill{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:999px;
  padding:10px 14px;
  color:var(--text);
  font-size:14px;
}
.layout{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:22px;
  padding:22px;
}
#quiz h2{margin:0 0 18px;font-size:31px;line-height:1.2}
.answers{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{
  border:1px solid var(--border);
  background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  min-height:150px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:left;
  transition:transform .15s ease,border-color .15s ease,background .15s ease;
}
.card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.18)}
.card b{
  display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);margin-bottom:14px
}
.card.correct{background:rgba(31,143,78,.18);border-color:rgba(31,143,78,.8)}
.card.wrong{background:rgba(166,52,52,.18);border-color:rgba(166,52,52,.8)}
.controls{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
button,input{
  border-radius:14px;
  border:1px solid var(--border);
  font-size:15px;
}
button{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  padding:12px 16px;
  cursor:pointer;
  font-weight:700;
}
button.secondary{background:var(--panel2)}
input{
  width:100%;padding:12px 14px;background:#10141c;color:#fff
}
.hidden{display:none}
#feedback{margin-top:16px;min-height:24px;font-weight:700}
.small{color:var(--muted);font-size:14px}
#result{font-size:28px;font-weight:800;line-height:1.3}
.scoreboard h3{margin:0 0 12px}
.score-entry{
  display:grid;grid-template-columns:40px 1fr auto;gap:10px;align-items:center;
  padding:10px 0;border-top:1px solid var(--border)
}
.score-entry:first-of-type{border-top:0}
.rank{font-weight:800;color:var(--accent2)}
.name{font-weight:700}
.stat{color:var(--muted);font-size:14px;text-align:right}
.formrow{display:flex;gap:10px;margin-top:16px}
.formrow input{flex:1}
@media (max-width:900px){
  .layout{grid-template-columns:1fr}
}
@media (max-width:760px){
  .answers{grid-template-columns:1fr}
  .hero h1{font-size:30px}
  #quiz h2{font-size:25px}
  .formrow{flex-direction:column}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>Honda EJ9 Hardcore Quiz</h1>
    <p>6 Fragen pro Runde. Mehr Fragen im Pool, knackigere Antworten, Zeitmessung und lokaler Highscore.</p>
  </div>

  <div class="topbar">
    <div class="pill" id="progressPill">Frage 1 / 6</div>
    <div class="pill" id="scorePill">Score: 0</div>
    <div class="pill" id="timerPill">Zeit: 00:00</div>
    <div class="pill" id="poolPill">Pool: 20</div>
  </div>

  <div class="layout">
    <div class="panel">
      <div id="quizArea">
        <div id="quiz"></div>
        <div id="feedback"></div>
        <div class="controls">
          <button id="next" class="hidden">Weiter</button>
          <button id="restart" class="secondary">Neu mischen</button>
        </div>
      </div>

      <div id="endArea" class="hidden">
        <div id="result"></div>
        <p class="small" id="resultMeta"></p>
        <div class="formrow">
          <input id="playerName" maxlength="20" placeholder="Dein Name für den Highscore">
          <button id="saveScoreBtn">Score speichern</button>
        </div>
        <div class="controls">
          <button id="playAgain">Nochmal spielen</button>
        </div>
      </div>
    </div>

    <div class="panel scoreboard">
      <h3>Highscore</h3>
      <p class="small">Gespeichert im Browser. Gewertet nach Score, dann Zeit.</p>
      <div id="highscoreList"></div>
    </div>
  </div>
</div>

<script>
const pool=[
{q:"Welche Leistung hat ein D14A4 ungefähr?",a:["75 PS","90 PS","120 PS"],c:1},
{q:"Welche Einspritzung nutzt der EJ9?",a:["Vergaser","Multipoint","Direkteinspritzung"],c:1},
{q:"Welche Plattform teilt der EJ9?",a:["EK","EG","EP"],c:0},
{q:"Welche Bremsen hat der EJ9 hinten?",a:["Scheiben","Trommeln","Keramik"],c:1},
{q:"Was limitiert den EJ9 bei Leistung eher seriennah?",a:["Getriebeabstufung","Kopf/Flow","Kraftstofftank"],c:1},
{q:"Welches Getriebe ist typisch?",a:["S20","Y21","T56"],c:0},
{q:"Warum beliebt für Swaps?",a:["leicht + günstig","Allradbasis","Längsmotor"],c:0},
{q:"Welche OBD-Generation ist für viele EJ9 typisch?",a:["OBD2","OBD0","CAN-FD"],c:0},
{q:"Was fehlt dem EJ9 im Vergleich zum VTi motorseitig?",a:["VTEC","Leerlaufregelung","Kühlwasser"],c:0},
{q:"Welche Hinterachskonstruktion ist typisch?",a:["Starrachse","Doppelquerlenker","Torsionsrohr"],c:1},
{q:"Warum ist er leicht?",a:["wenig Ausstattung","Alu-Karosserie","Carbon-Dach"],c:0},
{q:"Typischer Serien-Drehzahlbereich grob?",a:["bis etwa 6.500","bis 9.500","bis 4.200"],c:0},
{q:"Was bringt ein Mini-Me-Umbau in der Szene typischerweise?",a:["mehr Hubraum","VTEC-Kopf-Konzept","längeren Radstand"],c:1},
{q:"Welche Felgengröße ist seriennah am ehesten passend?",a:["13-14 Zoll","17 Zoll","19 Zoll"],c:0},
{q:"Was ist OEM+?",a:["Originaloptik mit sinnvollen Upgrades","nur komplett Serie","reiner Renntrim"],c:0},
{q:"Warum beliebt bei Tracktool-Projekten?",a:["leicht","langstreckiger Radstand","serienmäßiger Käfig"],c:0},
{q:"Wie wirkt der EJ9-Innenraum meist?",a:["spartanisch","ultraluxuriös","voll digital"],c:0},
{q:"Welche Ausstattung fehlt bei manchen EJ9 gern mal?",a:["Heckscheibe","Klima","Lichtmaschine"],c:1},
{q:"Warum wird die D-Serie oft unterschätzt?",a:["wenig Prestige trotz brauchbarer Basis","keine Teile verfügbar","grundsätzlich unhaltbar"],c:0},
{q:"Was ist bei alten EJ/EK-Modellen oft ein Thema?",a:["Rost","Wankeldefekt","Luftfederleck"],c:0},
{q:"Welcher Motorcode passt eher nicht zu einem serienmäßigen EJ9?",a:["D14A3","D14A4","B18C4"],c:2},
{q:"Welche Antriebsart hat der EJ9 serienmäßig?",a:["Frontantrieb","Heckantrieb","Allrad"],c:0},
{q:"Zu welcher Civic-Generation gehört der EJ9?",a:["5. Gen","6. Gen","7. Gen"],c:1},
{q:"Welcher Begriff beschreibt den Tausch auf stärkeren Honda-Motor am besten?",a:["Swap","Bleed","Shave"],c:0},
{q:"Welche Aussage zum EJ9 passt am ehesten?",a:["gute Basis für cleanen Aufbau","ab Werk Hochdrehzahlmonster","nur als Limousine gebaut"],c:0},
{q:"Welche Antwort beschreibt den EJ9 am treffendsten?",a:["kompakter 3-Türer","Roadster mit Stoffdach","Mittelmotor-Coupe"],c:0},
{q:"Was ist am EJ9 in der Szene oft reizvoller als pure Serienleistung?",a:["Basis und Potenzial","Luxusausstattung","Soundgenerator"],c:0},
{q:"Welcher Bereich macht beim EJ9-Umbau oft zuerst Sinn?",a:["Fahrwerk und Bremsen","Goldene Ventilkappen","Heckflosse"],c:0},
{q:"Welche Aussage zu Hinterradantrieb beim EJ9 ist korrekt?",a:["hat er nicht serienmäßig","nur im Facelift","nur in Japan"],c:0},
{q:"Warum wird OEM+-Look beim EJ9 gefeiert?",a:["sauber und stimmig","weil alles verchromt ist","weil breite Offroad-Reifen Pflicht sind"],c:0}
];

const QUESTIONS_PER_ROUND=6;
const STORAGE_KEY='ej9_highscores';

let questions=[];
let index=0;
let score=0;
let answered=false;
let startTime=0;
let timerInterval=null;
let elapsedMs=0;

const quiz=document.getElementById('quiz');
const feedback=document.getElementById('feedback');
const nextBtn=document.getElementById('next');
const restartBtn=document.getElementById('restart');
const endArea=document.getElementById('endArea');
const quizArea=document.getElementById('quizArea');
const result=document.getElementById('result');
const resultMeta=document.getElementById('resultMeta');
const progressPill=document.getElementById('progressPill');
const scorePill=document.getElementById('scorePill');
const timerPill=document.getElementById('timerPill');
const poolPill=document.getElementById('poolPill');
const highscoreList=document.getElementById('highscoreList');
const saveScoreBtn=document.getElementById('saveScoreBtn');
const playerNameInput=document.getElementById('playerName');
const playAgainBtn=document.getElementById('playAgain');

poolPill.textContent=`Pool: ${pool.length}`;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function formatTime(ms){
  const totalSeconds=Math.floor(ms/1000);
  const minutes=String(Math.floor(totalSeconds/60)).padStart(2,'0');
  const seconds=String(totalSeconds%60).padStart(2,'0');
  return `${minutes}:${seconds}`;
}

function updateTimer(){
  elapsedMs=Date.now()-startTime;
  timerPill.textContent=`Zeit: ${formatTime(elapsedMs)}`;
}

function startTimer(){
  clearInterval(timerInterval);
  startTime=Date.now();
  elapsedMs=0;
  updateTimer();
  timerInterval=setInterval(updateTimer,250);
}

function stopTimer(){
  clearInterval(timerInterval);
  updateTimer();
}

function renderQuestion(){
  const q=questions[index];
  answered=false;
  nextBtn.classList.add('hidden');
  feedback.textContent='';
  progressPill.textContent=`Frage ${index+1} / ${QUESTIONS_PER_ROUND}`;
  scorePill.textContent=`Score: ${score}`;

  quiz.innerHTML=`<h2>${q.q}</h2><div class="answers"></div>`;
  const answersWrap=quiz.querySelector('.answers');

  q.a.forEach((ans,i)=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`<div><b>${String.fromCharCode(65+i)}</b><div>${ans}</div></div><div class="small">Antwort wählen</div>`;
    d.onclick=()=>answer(i,d);
    answersWrap.appendChild(d);
  });
}

function answer(i,el){
  if(answered) return;
  answered=true;
  const correct=questions[index].c;
  document.querySelectorAll('.card').forEach((c,idx)=>{
    c.onclick=null;
    if(idx===correct) c.classList.add('correct');
  });
  if(i!==correct){
    el.classList.add('wrong');
    feedback.textContent='Nicht ganz. Die richtige Antwort ist markiert.';
  } else {
    score++;
    feedback.textContent='Sauber. Punkt geholt.';
  }
  scorePill.textContent=`Score: ${score}`;
  nextBtn.textContent=index<QUESTIONS_PER_ROUND-1?'Weiter':'Ergebnis ansehen';
  nextBtn.classList.remove('hidden');
}

function start(){
  questions=shuffle(pool).slice(0,QUESTIONS_PER_ROUND);
  index=0;
  score=0;
  answered=false;
  quizArea.classList.remove('hidden');
  endArea.classList.add('hidden');
  playerNameInput.value='';
  saveScoreBtn.disabled=false;
  saveScoreBtn.textContent='Score speichern';
  startTimer();
  renderQuestion();
}

function next(){
  if(index<QUESTIONS_PER_ROUND-1){
    index++;
    renderQuestion();
  } else {
    endGame();
  }
}

function getTitle(score){
  if(score===6) return 'Shawn - Mega Mechanic';
  if(score>=4) return 'Shawn - Street Mechanic';
  if(score>=2) return 'Shawn - Schrauber';
  return 'Shawn - Wannabe Honda Poser';
}

function endGame(){
  stopTimer();
  quizArea.classList.add('hidden');
  endArea.classList.remove('hidden');
  result.innerHTML=`${getTitle(score)}<br>${score}/${QUESTIONS_PER_ROUND} richtig`;
  resultMeta.textContent=`Deine Zeit: ${formatTime(elapsedMs)}`;
}

function readScores(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }catch(e){
    return [];
  }
}

function writeScores(scores){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
}

function renderScores(){
  const scores=readScores();
  if(!scores.length){
    highscoreList.innerHTML='<p class="small">Noch keine Einträge. Sei der Erste.</p>';
    return;
  }
  highscoreList.innerHTML=scores.map((entry,idx)=>`
    <div class="score-entry">
      <div class="rank">#${idx+1}</div>
      <div>
        <div class="name">${escapeHtml(entry.name)}</div>
        <div class="small">${entry.title}</div>
      </div>
      <div class="stat">${entry.score}/6<br>${entry.time}</div>
    </div>
  `).join('');
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function saveScore(){
  const rawName=playerNameInput.value.trim();
  const name=rawName || 'Anonym';
  const entry={
    name,
    score,
    timeMs: elapsedMs,
    time: formatTime(elapsedMs),
    title: getTitle(score)
  };
  const scores=readScores();
  scores.push(entry);
  scores.sort((a,b)=> b.score-a.score || a.timeMs-b.timeMs);
  writeScores(scores.slice(0,10));
  renderScores();
  saveScoreBtn.disabled=true;
  saveScoreBtn.textContent='Gespeichert';
}

nextBtn.onclick=next;
restartBtn.onclick=start;
playAgainBtn.onclick=start;
saveScoreBtn.onclick=saveScore;

renderScores();
start();
</script>
</body>
</html>
